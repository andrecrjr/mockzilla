name: CI — AppImage Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate AppImage build
        env:
          NO_STRIP: "true"
          LD_LIBRARY_PATH: ${{ github.workspace }}/src-tauri/resources/lib
        run: bun run desktop:build
